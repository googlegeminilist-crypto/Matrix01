<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrix01</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #bg-image {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
      opacity: 0.75;
      pointer-events: none;
      mix-blend-mode: luminosity;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #matrix {
      mix-blend-mode: screen;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      font-family: 'Courier New', monospace;
      font-size: clamp(2rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #00ff41;
      text-shadow:
        0 0 10px #00ff41,
        0 0 30px #00ff41,
        0 0 60px #00aa2a;
      -webkit-user-select: none;
      user-select: none;
    }

    #subtitle {
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.7rem, 2vw, 1.1rem);
      letter-spacing: 0.6em;
      color: #00aa2a;
      text-shadow: 0 0 8px #00aa2a;
      text-transform: uppercase;
      -webkit-user-select: none;
      user-select: none;
    }

    .emoji-target {
      position: fixed;
      font-size: 1.4rem;
      opacity: 0.2;
      cursor: pointer;
      z-index: 20;
      pointer-events: all;
      transition: opacity 0.15s, filter 0.15s;
      -webkit-user-select: none;
      user-select: none;
      filter: drop-shadow(0 0 5px #990000) drop-shadow(0 0 12px #550000) brightness(0.75);
    }

    .emoji-target:hover {
      opacity: 0.65;
      filter: drop-shadow(0 0 8px #ff2200) drop-shadow(0 0 18px #aa0000) brightness(1);
    }

    #score {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #00aa2a;
      letter-spacing: 0.1em;
      z-index: 20;
      -webkit-user-select: none;
      user-select: none;
    }

    .horror-text {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 700;
      color: #cc0000;
      text-align: center;
      line-height: 1.9;
      text-shadow:
        0 0 8px #ff0000,
        0 0 20px #880000,
        0 0 40px #440000;
      pointer-events: none;
      z-index: 25;
      max-width: 60vw;
      letter-spacing: 0.05em;
      background: rgba(0, 0, 0, 0.82);
      padding: 2rem 3rem;
      border: 1px solid #330000;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    body.horror-active #overlay,
    body.horror-active #score,
    body.horror-active #timestamp,
    body.horror-active #music-toggle,
    body.horror-active .point-flash {
      visibility: hidden;
    }

    .point-flash {
      position: fixed;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #00ff41;
      pointer-events: none;
      z-index: 30;
    }

    #music-toggle {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      background: none;
      border: 1px solid #005500;
      color: #00aa2a;
      font-size: 1.1rem;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }

    #music-toggle:hover {
      opacity: 1;
      border-color: #00ff41;
    }

    #music-toggle.muted {
      color: #333;
      border-color: #222;
      opacity: 0.4;
    }

    #snake-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 35;
    }

    #trail-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 50;
    }

    #age-gate {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
    }

    #age-gate h1 {
      color: #00ff41;
      font-size: clamp(1.4rem, 4vw, 2.5rem);
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px #00ff41, 0 0 30px #00aa2a;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    #age-gate p {
      color: #005500;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      text-align: center;
    }

    #age-gate input {
      background: #000;
      border: 1px solid #00aa2a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 1.4rem;
      width: 5rem;
      text-align: center;
      padding: 0.4rem 0.6rem;
      outline: none;
      letter-spacing: 0.1em;
    }

    #age-gate input:focus {
      border-color: #00ff41;
      box-shadow: 0 0 8px #00aa2a;
    }

    #age-gate button {
      margin-top: 1.2rem;
      background: none;
      border: 1px solid #00aa2a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 2rem;
      cursor: pointer;
    }

    #age-gate button:hover {
      border-color: #00ff41;
      box-shadow: 0 0 10px #00aa2a;
    }

    #age-error {
      margin-top: 1.2rem;
      color: #cc0000;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 6px #880000;
      min-height: 1.2em;
      text-align: center;
    }

    #timestamp {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #005500;
      letter-spacing: 0.1em;
      -webkit-user-select: none;
      user-select: none;
      z-index: 10;
    }

  </style>
</head>
<body>

  <div id="age-gate">
    <h1>MATRIX01</h1>
    <p>YOU MUST BE 18 OR OLDER TO ENTER</p>
    <input type="number" id="age-input" placeholder="AGE" min="1" max="120" />
    <button type="button" id="age-btn">ENTER</button>
    <div id="age-error"></div>
  </div>

  <img id="bg-image" src="cool dool.png" alt="" />
  <canvas id="matrix"></canvas>
  <canvas id="snake-canvas"></canvas>
  <canvas id="trail-canvas"></canvas>

  <div id="overlay">
    <div id="title">MATRIX01</div>
    <div id="subtitle">Wake up, Neo...</div>
  </div>

  <div id="score">SCORE: 0</div>
  <div id="timestamp"></div>
  <button type="button" id="music-toggle" title="Toggle music">&#9834;</button>

  <script>
    var ageGate  = document.getElementById('age-gate');
    var ageInput = document.getElementById('age-input');
    var ageBtn   = document.getElementById('age-btn');
    var ageError = document.getElementById('age-error');

    function checkAge() {
      var val = parseInt(ageInput.value, 10);
      if (isNaN(val) || val < 1) {
        ageError.textContent = 'PLEASE ENTER YOUR AGE.';
        return;
      }
      if (val < 18) {
        ageError.textContent = 'ACCESS DENIED. YOU MUST BE 18 OR OLDER.';
        ageInput.value = '';
        ageInput.focus();
        return;
      }
      ageGate.style.display = 'none';
    }

    ageBtn.addEventListener('click', checkAge);
    ageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkAge();
    });
    ageInput.focus();

    var canvas = document.getElementById('matrix');
    var ctx = canvas.getContext('2d');
    var FONT_SIZE = 16;
    var cols, drops;

    function buildChars() {
      var s = '';
      for (var i = 0x30A2; i <= 0x30F3; i += 2) {
        s += String.fromCharCode(i);
      }
      s += '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';
      return s;
    }

    var CHARS = buildChars();
    var horrorActive = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / FONT_SIZE);
      drops = [];
      for (var i = 0; i < cols; i++) {
        drops[i] = Math.floor(Math.random() * -100);
      }
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = FONT_SIZE + 'px "Courier New", monospace';

      for (var i = 0; i < drops.length; i++) {
        var y = drops[i] * FONT_SIZE;
        var x = i * FONT_SIZE;
        var char = CHARS[Math.floor(Math.random() * CHARS.length)];

        ctx.fillStyle = '#eeffee';
        ctx.fillText(char, x, y);

        if (drops[i] > 1) {
          ctx.fillStyle = '#00ff41';
          ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], x, y - FONT_SIZE);
        }

        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    resize();
    window.addEventListener('resize', resize);
    setInterval(draw, 40);

    var bgMusic = new Audio('Untitled 4.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.5;

    var musicOn = false;
    var musicBtn = document.getElementById('music-toggle');

    musicBtn.addEventListener('click', function() {
      if (musicOn) {
        bgMusic.pause();
        musicOn = false;
        musicBtn.classList.add('muted');
        musicBtn.innerHTML = '&#9835;';
      } else {
        bgMusic.play();
        musicOn = true;
        musicBtn.classList.remove('muted');
        musicBtn.innerHTML = '&#9834;';
      }
    });

    var spookySnd   = new Audio('Spooky,_creepy,_eeri-1758049336211.mp3');
    var laughSnd    = new Audio('freesound_community-succubus-laughter-71829 (1).mp3');
    var whisperSnd  = new Audio('a_women_whispering_H-%232-1758097415704.mp3');
    var shotgunSnd  = new Audio('kakaist-sound-shotgun-sfx-318127.mp3');
    var fourVoices  = new Audio('freesound_community-four_voices_whispering_2_wecho-6755.mp3');

    whisperSnd.addEventListener('ended', function() {
      shotgunSnd.currentTime = 0;
      shotgunSnd.play();
    });

    function maybePlaySpooky() {
      var r = Math.random();
      if (r < 0.05) {
        fourVoices.currentTime = 0;
        fourVoices.play();
      } else if (r < 0.15) {
        whisperSnd.currentTime = 0;
        whisperSnd.play();
      } else if (r < 0.25) {
        laughSnd.currentTime = 0;
        laughSnd.play();
      } else if (r < 0.55) {
        spookySnd.currentTime = 0;
        spookySnd.play();
      }
    }

    var EMOJIS = [
      '\u{1F620}', // grumpy
      '\u{1F60A}', // happy
      '\u{1F622}', // sad
      '\u{1F62D}', // crying
      '\u{1F632}', // surprised
      '\u{1F602}', // laughing
      '\u{1F624}', // upset
      '\u{1F621}'  // angry
    ];
    var score = 0;
    var scoreEl = document.getElementById('score');
    var activeEmojis = [];

    function spawnEmoji() {
      var el = document.createElement('div');
      el.className = 'emoji-target';
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      var margin = 60;
      el.style.left = (margin + Math.random() * (window.innerWidth  - margin * 2)) + 'px';
      el.style.top  = (margin + Math.random() * (window.innerHeight - margin * 2)) + 'px';
      document.body.appendChild(el);
      activeEmojis.push(el);

      el.addEventListener('click', function(e) {
        score++;
        scoreEl.textContent = 'SCORE: ' + score;
        maybePlaySpooky();
        showPointFlash(e.clientX, e.clientY, '+1');
        if (score % 100 === 0) startSnake();

        maybeShowHorrorText();
        removeEmoji(el);
      });

      var lifetime = 3000 + Math.random() * 4000;
      setTimeout(function() { removeEmoji(el); }, lifetime);
    }

    var HORROR_TEXTS = [
      'The dark one will destroy your soul inside the horror train.\nHe will cut away at your brain\nYour heart will be his supper\nYou will be in pain you will be his dinner',
      'Before the dark one kills you he will feed you nightmares\nYou will dream horrors beyond your imagination feed you brutal fears\nTears of blood will fall down your face for years\nUntil you die you will be trapped in nightmare'
    ];

    function maybeShowHorrorText() {
      var r = Math.random();
      if (r >= 0.1) return;
      var text = r < 0.05 ? HORROR_TEXTS[0] : HORROR_TEXTS[1];
      var el = document.createElement('div');
      el.className = 'horror-text';
      el.style.opacity = '1';
      el.textContent = text;
      el.style.whiteSpace = 'pre-line';
      document.body.appendChild(el);
      document.body.classList.add('horror-active');
      horrorActive = true;
      var st = null;
      var hold = 9000;
      var fadeLen = 1000;
      function fade(ts) {
        if (!st) st = ts;
        var elapsed = ts - st;
        if (elapsed < hold) {
          el.style.opacity = '1';
          requestAnimationFrame(fade);
        } else {
          var p = Math.min((elapsed - hold) / fadeLen, 1);
          el.style.opacity = String(1 - p);
          if (p < 1) { requestAnimationFrame(fade); } else {
            el.remove();
            document.body.classList.remove('horror-active');
            horrorActive = false;
          }
        }
      }
      requestAnimationFrame(fade);
    }

    function showPointFlash(x, y, text) {
      var fl = document.createElement('div');
      fl.className = 'point-flash';
      fl.textContent = text;
      fl.style.left = x + 'px';
      fl.style.top  = (y - 10) + 'px';
      fl.style.opacity = '1';
      document.body.appendChild(fl);
      var sy = y - 10, st = null;
      function af(ts) {
        if (!st) st = ts;
        var p = Math.min((ts - st) / 800, 1);
        fl.style.opacity = String(1 - p);
        fl.style.top = (sy - p * 40) + 'px';
        if (p < 1) { requestAnimationFrame(af); } else { fl.remove(); }
      }
      requestAnimationFrame(af);
    }

    var snakeCanvas = document.getElementById('snake-canvas');
    var sctx = snakeCanvas.getContext('2d');
    var snake = null;

    function resizeSnake() {
      snakeCanvas.width  = window.innerWidth;
      snakeCanvas.height = window.innerHeight;
    }
    resizeSnake();
    window.addEventListener('resize', resizeSnake);

    function pickSnakeTarget() {
      var alive = activeEmojis.filter(function(e) { return !!e.parentNode; });
      if (alive.length === 0) return null;
      return alive[Math.floor(Math.random() * alive.length)];
    }

    function startSnake() {
      if (snake) return;
      snake = {
        x:        Math.random() * window.innerWidth,
        y:        Math.random() * window.innerHeight,
        vx:       0,
        vy:       0,
        segments: [],
        wobble:   0,
        target:   null,
        timeLeft: 20000,
        lastTs:   null
      };
      for (var i = 0; i < 35; i++) {
        snake.segments.push({ x: snake.x, y: snake.y });
      }
      snake.target = pickSnakeTarget();
      requestAnimationFrame(tickSnake);
    }

    function tickSnake(ts) {
      if (!snake) return;
      sctx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);

      if (!snake.lastTs) snake.lastTs = ts;
      var dt = Math.min(ts - snake.lastTs, 50);
      snake.lastTs = ts;
      snake.timeLeft -= dt;
      if (snake.timeLeft <= 0) { snake = null; return; }

      // refresh target if gone
      if (!snake.target || !snake.target.parentNode) {
        snake.target = pickSnakeTarget();
      }

      var spd = 14;
      snake.wobble += dt * 0.008;

      if (snake.target && snake.target.parentNode) {
        var tx = parseFloat(snake.target.style.left) + 14;
        var ty = parseFloat(snake.target.style.top)  + 14;
        var ta = Math.atan2(ty - snake.y, tx - snake.x);
        // zig-zag wobble layered on top of homing angle
        var finalAngle = ta + Math.sin(snake.wobble) * 0.9;
        snake.vx = Math.cos(finalAngle) * spd;
        snake.vy = Math.sin(finalAngle) * spd;
      } else {
        snake.vx = Math.cos(snake.wobble) * spd;
        snake.vy = Math.sin(snake.wobble) * spd;
      }

      snake.x = Math.max(0, Math.min(snakeCanvas.width,  snake.x + snake.vx));
      snake.y = Math.max(0, Math.min(snakeCanvas.height, snake.y + snake.vy));

      snake.segments.unshift({ x: snake.x, y: snake.y });
      if (snake.segments.length > 35) snake.segments.pop();

      // collision — read style.left/top directly, check 6 segments for tunneling
      var checkSegs = Math.min(6, snake.segments.length);
      for (var ci = activeEmojis.length - 1; ci >= 0; ci--) {
        var em  = activeEmojis[ci];
        if (!em.parentNode) continue;
        var ecx = parseFloat(em.style.left)  + 14;
        var ecy = parseFloat(em.style.top)   + 14;
        var hit = false;
        for (var cs = 0; cs < checkSegs; cs++) {
          var seg = snake.segments[cs];
          var ddx = seg.x - ecx;
          var ddy = seg.y - ecy;
          if (ddx*ddx + ddy*ddy < 60*60) { hit = true; break; }
        }
        if (hit) {
          score += 5;
          scoreEl.textContent = 'SCORE: ' + score;
          if (score % 100 === 0) startSnake();
          maybePlaySpooky();
          showPointFlash(ecx, ecy, '+5');
          removeEmoji(em);
        }
      }

      // draw glowing body
      sctx.shadowBlur  = 18;
      sctx.shadowColor = '#ff2200';
      for (var j = snake.segments.length - 1; j >= 0; j--) {
        var seg = snake.segments[j];
        var t   = 1 - j / snake.segments.length;
        var rad = 9 * t + 1;
        sctx.beginPath();
        sctx.arc(seg.x, seg.y, rad, 0, Math.PI * 2);
        sctx.fillStyle = 'rgba(' + Math.floor(180 + 75*t) + ',' + Math.floor(20*t) + ',0,' + (t * 0.95) + ')';
        sctx.fill();
      }

      // demon eyes on head
      var head  = snake.segments[0];
      var ha    = Math.atan2(snake.vy, snake.vx);
      var px    = Math.sin(ha) * 4;
      var py    = -Math.cos(ha) * 4;
      var fx    = Math.cos(ha) * 7;
      var fy    = Math.sin(ha) * 7;
      sctx.shadowBlur  = 8;
      sctx.shadowColor = '#ff0000';
      sctx.fillStyle   = '#ffffff';
      [[px,py],[-px,-py]].forEach(function(o) {
        sctx.beginPath();
        sctx.arc(head.x + fx + o[0], head.y + fy + o[1], 2.5, 0, Math.PI * 2);
        sctx.fill();
      });
      sctx.fillStyle = '#ff0000';
      [[px,py],[-px,-py]].forEach(function(o) {
        sctx.beginPath();
        sctx.arc(head.x + fx + o[0], head.y + fy + o[1], 1.2, 0, Math.PI * 2);
        sctx.fill();
      });

      sctx.shadowBlur = 0;
      requestAnimationFrame(tickSnake);
    }

    function removeEmoji(el) {
      if (!el.parentNode) return;
      el.remove();
      var idx = activeEmojis.indexOf(el);
      if (idx > -1) activeEmojis.splice(idx, 1);
    }

    function spawnBatch() {
      spawnEmoji();
      spawnEmoji();
      spawnEmoji();
    }
    setInterval(spawnBatch, 700);

    var ts = document.getElementById('timestamp');
    function tick() {
      ts.textContent = new Date().toISOString().replace('T', ' ').slice(0, 19);
    }
    tick();
    setInterval(tick, 1000);

    var trailCanvas = document.getElementById('trail-canvas');
    var tctx = trailCanvas.getContext('2d');
    var bloodDrops = [];
    var bloodPhase = 0;

    function resizeTrail() {
      trailCanvas.width  = window.innerWidth;
      trailCanvas.height = window.innerHeight;
    }
    resizeTrail();
    window.addEventListener('resize', resizeTrail);

    document.addEventListener('mousemove', function(e) {
      if (Math.random() < 0.6) {
        bloodDrops.push({
          x:     e.clientX - (e.clientX % FONT_SIZE),
          drop:  Math.floor(e.clientY / FONT_SIZE),
          trail: []
        });
        if (bloodDrops.length > 80) bloodDrops.shift();
      }
    });

    function animateBlood() {
      bloodPhase += 0.07;
      // flash: alternate between showing blood and showing matrix clearly
      var flash = 0.65 + Math.sin(bloodPhase) * 0.35;

      tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      tctx.font = FONT_SIZE + 'px "Courier New", monospace';

      for (var i = bloodDrops.length - 1; i >= 0; i--) {
        var d = bloodDrops[i];

        // draw + decay trail chars
        for (var t = d.trail.length - 1; t >= 0; t--) {
          d.trail[t].life -= 0.035;
          if (d.trail[t].life <= 0) { d.trail.splice(t, 1); continue; }
          tctx.globalAlpha = d.trail[t].life * flash;
          tctx.fillStyle = '#aa0000';
          tctx.fillText(d.trail[t].char, d.x, d.trail[t].y);
        }

        // draw lead char
        var y = d.drop * FONT_SIZE;
        if (y <= trailCanvas.height + FONT_SIZE) {
          var char = CHARS[Math.floor(Math.random() * CHARS.length)];
          tctx.globalAlpha = flash;
          tctx.fillStyle = '#ff3333';
          tctx.fillText(char, d.x, y);
          d.trail.push({ char: char, y: y, life: 0.9 });
          d.drop++;
        }

        if (d.trail.length === 0 && y > trailCanvas.height + FONT_SIZE) {
          bloodDrops.splice(i, 1);
        }
      }

      tctx.globalAlpha = 1;
      requestAnimationFrame(animateBlood);
    }
    animateBlood();

    var bgImg       = document.getElementById('bg-image');
    var bgVisible   = false;
    var bgTargetOp  = 0;
    var bgCurrentOp = 0;
    bgImg.style.opacity = '0';

    function scheduleBgToggle() {
      var delay = bgVisible
        ? 2000 + Math.random() * 5000
        : 1000 + Math.random() * 4000;
      setTimeout(function() {
        bgVisible  = !bgVisible;
        bgTargetOp = bgVisible ? 0.75 : 0;
        scheduleBgToggle();
      }, delay);
    }

    function animateBg() {
      if (Math.abs(bgCurrentOp - bgTargetOp) > 0.004) {
        bgCurrentOp += (bgTargetOp - bgCurrentOp) * 0.05;
        bgImg.style.opacity = bgCurrentOp.toFixed(3);
      }
      requestAnimationFrame(animateBg);
    }

    scheduleBgToggle();
    animateBg();
  </script>
</body>
</html>
