<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrix01</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    button, input, a { cursor: none; }

    #cursor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 100;
    }

    #bg-image {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
      opacity: 0.75;
      pointer-events: none;
      mix-blend-mode: luminosity;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #matrix {
      mix-blend-mode: screen;
    }

    /* === DEPTH OF FIELD — active only when cool dool.png is visible === */

    /* Breathing animation — opacity only = pure GPU Composite, zero Paint */
    @keyframes dofBreathe {
      0%   { opacity: 0.68; }
      50%  { opacity: 0.96; }
      100% { opacity: 0.68; }
    }

    /* Matrix zooms toward viewer when DOF is active */
    body.dof-active #matrix {
      transform: scale(1.09);
      transform-origin: center center;
      transition: transform 1.1s ease;
    }

    /* DOF layer 1 — soft blur, wide ring from 38% outward */
    #matrix-dof {
      mix-blend-mode: screen;
      pointer-events: none;
      display: none;
      -webkit-mask-image: radial-gradient(ellipse 72% 65% at 50% 50%,
        transparent 38%, rgba(0,0,0,0.4) 54%, rgba(0,0,0,0.9) 72%, black 88%);
      mask-image: radial-gradient(ellipse 72% 65% at 50% 50%,
        transparent 38%, rgba(0,0,0,0.4) 54%, rgba(0,0,0,0.9) 72%, black 88%);
      animation: dofBreathe 4s ease-in-out infinite;
    }
    body.dof-active #matrix-dof { display: block; }

    /* DOF layer 2 — medium-heavy blur, tighter mask from 24% outward */
    #matrix-dof2 {
      mix-blend-mode: screen;
      pointer-events: none;
      display: none;
      -webkit-mask-image: radial-gradient(ellipse 52% 46% at 50% 50%,
        transparent 24%, rgba(0,0,0,0.35) 42%, rgba(0,0,0,0.85) 60%, black 76%);
      mask-image: radial-gradient(ellipse 52% 46% at 50% 50%,
        transparent 24%, rgba(0,0,0,0.35) 42%, rgba(0,0,0,0.85) 60%, black 76%);
      animation: dofBreathe 4s ease-in-out infinite;
      animation-delay: -1s;
    }
    body.dof-active #matrix-dof2 { display: block; }

    /* DOF layer 3 — very heavy blur, extreme edges only from 12% outward */
    #matrix-dof3 {
      mix-blend-mode: screen;
      pointer-events: none;
      display: none;
      -webkit-mask-image: radial-gradient(ellipse 34% 30% at 50% 50%,
        transparent 12%, rgba(0,0,0,0.25) 28%, rgba(0,0,0,0.8) 46%, black 64%);
      mask-image: radial-gradient(ellipse 34% 30% at 50% 50%,
        transparent 12%, rgba(0,0,0,0.25) 28%, rgba(0,0,0,0.8) 46%, black 64%);
      animation: dofBreathe 4s ease-in-out infinite;
      animation-delay: -2s;
    }
    body.dof-active #matrix-dof3 { display: block; }

    /* DOF layer 4 — extreme blur, chromatic-tinted, corners only */
    #matrix-dof4 {
      mix-blend-mode: screen;
      pointer-events: none;
      display: none;
      filter: hue-rotate(85deg) saturate(1.6);
      -webkit-mask-image: radial-gradient(ellipse 22% 18% at 50% 50%,
        transparent 0%, rgba(0,0,0,0.15) 18%, rgba(0,0,0,0.7) 36%, black 55%);
      mask-image: radial-gradient(ellipse 22% 18% at 50% 50%,
        transparent 0%, rgba(0,0,0,0.15) 18%, rgba(0,0,0,0.7) 36%, black 55%);
    }
    body.dof-active #matrix-dof4 { display: block; }

    /* Dark vignette — frames the "portal" to step through */
    #dof-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      display: none;
      background: radial-gradient(ellipse 58% 52% at 50% 50%,
        transparent 30%,
        rgba(0,0,0,0.35) 52%,
        rgba(0,0,0,0.72) 72%,
        rgba(0,0,0,0.92) 88%,
        black 100%);
      animation: dofBreathe 5s ease-in-out infinite;
    }
    body.dof-active #dof-vignette { display: block; }

    /* Image — blurred edge copy (portal depth) */
    #bg-image-dof {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: luminosity;
      filter: blur(14px) brightness(1.08) saturate(1.2);
      transition: opacity 0.6s ease;
      transform: scale(1.06);
      -webkit-mask-image: radial-gradient(ellipse 46% 40% at 50% 50%,
        transparent 18%, rgba(0,0,0,0.45) 38%, rgba(0,0,0,0.9) 60%, black 78%);
      mask-image: radial-gradient(ellipse 46% 40% at 50% 50%,
        transparent 18%, rgba(0,0,0,0.45) 38%, rgba(0,0,0,0.9) 60%, black 78%);
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      font-family: 'Courier New', monospace;
      font-size: clamp(2rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #00ff41;
      text-shadow:
        0 0 10px #00ff41,
        0 0 30px #00ff41,
        0 0 60px #00aa2a;
      -webkit-user-select: none;
      user-select: none;
    }

    #subtitle {
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.7rem, 2vw, 1.1rem);
      letter-spacing: 0.6em;
      color: #00aa2a;
      text-shadow: 0 0 8px #00aa2a;
      text-transform: uppercase;
      -webkit-user-select: none;
      user-select: none;
    }

    .emoji-target {
      position: fixed;
      font-size: 1.4rem;
      opacity: 0.2;
      cursor: pointer;
      z-index: 20;
      pointer-events: all;
      transition: opacity 0.15s, filter 0.15s;
      -webkit-user-select: none;
      user-select: none;
      filter: drop-shadow(0 0 5px #990000) drop-shadow(0 0 12px #550000) brightness(0.75);
    }

    .emoji-target:hover {
      opacity: 0.65;
      filter: drop-shadow(0 0 8px #ff2200) drop-shadow(0 0 18px #aa0000) brightness(1);
    }

    /* === ZOMBIE BURST (emoji click — main screen only) === */
    @keyframes zombieDOF {
      0%   { transform: translate(-50%,-50%) scale(0.12); opacity: 0; }
      20%  { opacity: var(--zo); }
      52%  { transform: translate(-50%,-50%) scale(1);    opacity: var(--zo); }
      78%  { transform: translate(-50%,-50%) scale(0.95); opacity: var(--zo); }
      100% { transform: translate(-50%,-50%) scale(0.3);  opacity: 0; }
    }
    .zombie-burst {
      position: fixed;
      pointer-events: none;
      z-index: 88;
      animation: zombieDOF ease-in-out forwards;
      transform-origin: center center;
    }

    /* === GRENADE TARGET === */
    @keyframes grenadePulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    filter: drop-shadow(0 0 8px #00ff44) drop-shadow(0 0 20px #006622); }
      50%     { transform: translate(-50%,-50%) scale(1.10); filter: drop-shadow(0 0 18px #44ff88) drop-shadow(0 0 40px #00aa33); }
    }
    @keyframes grenadeExplode {
      0%   { transform: translate(-50%,-50%) scale(0.1);  opacity: 0; }
      15%  { opacity: var(--go); }
      50%  { transform: translate(-50%,-50%) scale(1.1);  opacity: var(--go); }
      80%  { transform: translate(-50%,-50%) scale(0.95); opacity: var(--go); }
      100% { transform: translate(-50%,-50%) scale(0.2);  opacity: 0; }
    }
    .grenade-target {
      position: fixed;
      z-index: 25;
      cursor: pointer;
      pointer-events: all;
      width: 80px; height: 80px;
    }
    .grenade-burst {
      position: fixed;
      pointer-events: none;
      z-index: 90;
      animation: grenadeExplode ease-out forwards;
      transform-origin: center center;
    }

    #score {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #00aa2a;
      letter-spacing: 0.1em;
      z-index: 20;
      -webkit-user-select: none;
      user-select: none;
    }

    #ai-score {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #aaffdd;
      letter-spacing: 0.1em;
      text-shadow: 0 0 6px #55ffaa;
      z-index: 20;
      -webkit-user-select: none;
      user-select: none;
    }

    .horror-text {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 700;
      color: #cc0000;
      text-align: center;
      line-height: 1.9;
      text-shadow:
        0 0 8px #ff0000,
        0 0 20px #880000,
        0 0 40px #440000;
      pointer-events: none;
      z-index: 25;
      max-width: 60vw;
      letter-spacing: 0.05em;
      background: rgba(0, 0, 0, 0.82);
      padding: 2rem 3rem;
      border: 1px solid #330000;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    body.horror-active #overlay,
    body.horror-active #score,
    body.horror-active #timestamp,
    body.horror-active #music-toggle,
    body.horror-active .point-flash {
      visibility: hidden;
    }

    .point-flash {
      position: fixed;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #00ff41;
      pointer-events: none;
      z-index: 30;
    }

    #music-toggle {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      background: none;
      border: 1px solid #005500;
      color: #00aa2a;
      font-size: 1.1rem;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }

    #music-toggle:hover {
      opacity: 1;
      border-color: #00ff41;
    }

    #music-toggle.muted {
      color: #333;
      border-color: #222;
      opacity: 0.4;
    }

    #age-music-btn {
      position: absolute !important;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 50;
      background: rgba(60,0,0,0.75);
      border: 1px solid #8b0000;
      color: #cc0000;
      font-size: 1.1rem;
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
      transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }
    #age-music-btn:hover {
      opacity: 1;
      border-color: #ff2200;
      box-shadow: 0 0 12px rgba(200,0,0,0.65);
    }
    #age-music-btn.muted {
      color: #440000;
      border-color: #330000;
      opacity: 0.45;
    }

    #snake-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 35;
    }

    #ghost-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 30;
    }

    #trail-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ---- AGE GATE SKULL DOF ---- */
    @keyframes skullPush {
      0%   { transform: perspective(700px) scale(1.0);   opacity: 0.82; }
      50%  { transform: perspective(700px) scale(1.14);  opacity: 1.0;  }
      100% { transform: perspective(700px) scale(1.0);   opacity: 0.82; }
    }
    @keyframes skullGlow {
      0%   { opacity: 0.55; }
      50%  { opacity: 1.0;  }
      100% { opacity: 0.55; }
    }
    .skull-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url('skull.png') center 38% / contain no-repeat;
    }
    .skull-base {
      z-index: 0;
      animation: skullPush 5s ease-in-out infinite;
    }
    /* mid-ring blur — blurs from ~35% outward */
    .skull-dof1 {
      z-index: 1;
      filter: blur(10px) brightness(0.88);
      animation: skullPush 5s ease-in-out infinite;
      -webkit-mask-image: radial-gradient(ellipse 52% 56% at 50% 38%,
        transparent 32%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.92) 68%, black 84%);
      mask-image: radial-gradient(ellipse 52% 56% at 50% 38%,
        transparent 32%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.92) 68%, black 84%);
    }
    /* outer-ring heavy blur — blurs from ~18% outward */
    .skull-dof2 {
      z-index: 2;
      filter: blur(26px) brightness(0.75);
      animation: skullPush 5s ease-in-out infinite;
      -webkit-mask-image: radial-gradient(ellipse 34% 38% at 50% 38%,
        transparent 15%, rgba(0,0,0,0.3) 32%, rgba(0,0,0,0.85) 52%, black 70%);
      mask-image: radial-gradient(ellipse 34% 38% at 50% 38%,
        transparent 15%, rgba(0,0,0,0.3) 32%, rgba(0,0,0,0.85) 52%, black 70%);
    }
    /* deep vignette frame — focuses the eye on skull centre */
    .skull-vignette {
      z-index: 3;
      background: none;
      background-image: radial-gradient(ellipse 50% 54% at 50% 38%,
        transparent 22%,
        rgba(0,0,0,0.28) 42%,
        rgba(0,0,0,0.65) 62%,
        rgba(0,0,0,0.9) 80%,
        black 100%);
      animation: skullGlow 5s ease-in-out infinite;
    }
    /* eye-glow pulse — eerie purple light from the skull's eyes */
    .skull-eyeglow {
      z-index: 4;
      background: none;
      background-image:
        radial-gradient(ellipse 8% 5% at 42% 46%, rgba(180,60,255,0.55) 0%, transparent 100%),
        radial-gradient(ellipse 8% 5% at 58% 46%, rgba(180,60,255,0.55) 0%, transparent 100%),
        radial-gradient(ellipse 28% 22% at 50% 46%, rgba(100,0,180,0.18) 0%, transparent 100%);
      animation: skullGlow 2.2s ease-in-out infinite;
    }

    /* ── 3D BLOOD WARNING TEXT ── */
    @keyframes bloodPulse {
      0%   { opacity: 0.72; filter: brightness(0.82) saturate(1.1); }
      40%  { opacity: 1.00; filter: brightness(1.08) saturate(1.6) drop-shadow(2px 4px 3px #1a0000); }
      100% { opacity: 0.72; filter: brightness(0.82) saturate(1.1); }
    }
    @keyframes bloodFloat {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    #warning-wrap {
      position: absolute !important;
      left: 64%;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 8;
      box-sizing: border-box;
    }
    .wt-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2vh 2vw 2vh 1vw;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.75rem, 1.5vw, 1.15rem);
      line-height: 2.2;
    }
    /* FAR — most blurred, darkest, offset deepest */
    .wt-far {
      filter: blur(14px);
      color: #300000;
      transform: translate(12px, 16px) scale(1.025);
      opacity: 0.32;
    }
    /* MID — soft blur */
    .wt-mid {
      filter: blur(6px);
      color: #7a0000;
      transform: translate(6px, 8px);
      opacity: 0.55;
    }
    /* NEAR — sharp, bright, 12-step 3D blood extrusion + perspective */
    .wt-near {
      /* fresh arterial blood — dark crimson, wet shine, no neon glow */
      color: #c41200;
      animation: bloodPulse 4.2s ease-in-out infinite, bloodFloat 7s ease-in-out infinite;
      text-shadow:
        /* wet-blood specular highlight — tiny bright spot top-left */
        -1px -1px 0 rgba(220, 80, 60, 0.55),
        /* dark edge rim — makes letters feel solid/carved */
         0    0   1px #0a0000,
        /* 3D extrusion — dark blood stepping into the screen */
        1px  2px  0 #a01000,
        2px  4px  0 #8c0e00,
        3px  6px  0 #780c00,
        4px  8px  0 #640a00,
        5px 10px  0 #500800,
        6px 12px  0 #3c0600,
        7px 14px  0 #280400,
        8px 16px  0 #140200,
        /* deep pool shadow at base */
        9px 18px  6px rgba(8, 0, 0, 0.92),
       12px 22px 12px rgba(0, 0, 0, 0.85);
    }

    /* ── BLOOD DRIPS ── */
    @keyframes dripFall {
      0%   { transform: translateY(-4px) scaleY(0.2); opacity: 0; }
      4%   { transform: translateY(0)    scaleY(1.0); opacity: 1; }
      94%  { opacity: 0.90; }
      100% { transform: translateY(108vh) scaleY(1.0); opacity: 0.15; }
    }
    @keyframes dripWobble {
      0%   { transform: translateY(-4px) scaleY(0.2) translateX(0);    opacity: 0; }
      4%   { transform: translateY(0)    scaleY(1.0) translateX(0);    opacity: 1; }
      20%  { transform: translateY(20vh) scaleY(1.0) translateX(1.5px); }
      40%  { transform: translateY(40vh) scaleY(1.0) translateX(-1px);  }
      65%  { transform: translateY(65vh) scaleY(1.0) translateX(1px);   }
      94%  { opacity: 0.90; }
      100% { transform: translateY(108vh) scaleY(1.0) translateX(0);   opacity: 0.15; }
    }
    .blood-drip {
      position: absolute;
      pointer-events: none;
      transform-origin: top center;
      border-radius: 0 0 3px 3px;
      z-index: 9;
    }
    .blood-blob {
      position: absolute;
      bottom: -60%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 42% 42% 50% 50%;
    }
    .blood-blob-sat {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    /* EXTRA-FAR layer — heaviest blur, phantom depth */
    .wt-xfar {
      filter: blur(22px);
      color: #1a0000;
      transform: translate(22px, 28px) scale(1.05);
      opacity: 0.22;
    }

        #age-gate {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      /* centred in the left half — between edge and skull at 50% */
      padding-left: clamp(2rem, 12vw, 14vw);
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    /* age gate content floats above the skull layers */
    #age-gate > *:not(.skull-layer):not(#warning-wrap):not(#age-music-btn):not(audio) {
      position: relative;
      z-index: 10;
      max-width: 28vw;
    }

    #age-gate h1 {
      color: #00ff41;
      font-size: clamp(1.2rem, 2.4vw, 2rem);
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px #00ff41, 0 0 30px #00aa2a;
      margin: 0 0 0.6rem 0;
      text-align: left;
    }

    #age-gate p {
      color: #005500;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      margin: 0 0 0.5rem 0;
      text-align: left;
    }
    #age-gate p::before { content: '> '; color: #00ff41; }

    #age-gate .instructions {
      color: #00aa2a;
      font-size: clamp(0.6rem, 1.1vw, 0.78rem);
      letter-spacing: 0.06em;
      line-height: 1.9;
      text-align: left;
      text-shadow: 0 0 6px #005500;
      margin: 0 0 0.8rem 0;
      padding: 0;
      max-width: 28vw;
    }

    #age-gate input {
      background: #000;
      border: 1px solid #00aa2a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      width: 5rem;
      text-align: left;
      padding: 0.3rem 0.5rem;
      outline: none;
      letter-spacing: 0.1em;
      margin: 0.4rem 0 0.4rem 0;
      display: block;
    }

    #age-gate input:focus {
      border-color: #00ff41;
      box-shadow: 0 0 8px #00aa2a;
    }

    #age-gate button {
      margin: 0.4rem 0 0 0;
      background: none;
      border: 1px solid #00aa2a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      padding: 0.4rem 1.6rem;
      cursor: pointer;
      display: block;
    }

    #age-gate button:hover {
      border-color: #00ff41;
      box-shadow: 0 0 10px #00aa2a;
    }

    #age-error {
      margin-top: 1.2rem;
      color: #cc0000;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 6px #880000;
      min-height: 1.2em;
      text-align: center;
    }

    @keyframes bloodyFlash {
      0%   { opacity: 0.55; }
      12%  { opacity: 0.85; }
      25%  { opacity: 0.45; }
      38%  { opacity: 0.92; }
      50%  { opacity: 0.5;  }
      63%  { opacity: 0.88; }
      80%  { opacity: 0.4;  }
      100% { opacity: 0.7;  }
    }
    #bloody-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
      background:
        radial-gradient(ellipse at 15% 5%,   rgba(180,0,0,0.75) 0%, transparent 38%),
        radial-gradient(ellipse at 85% 8%,   rgba(160,0,0,0.7)  0%, transparent 35%),
        radial-gradient(ellipse at 5%  55%,  rgba(140,0,0,0.65) 0%, transparent 30%),
        radial-gradient(ellipse at 95% 60%,  rgba(130,0,0,0.6)  0%, transparent 28%),
        radial-gradient(ellipse at 48% 98%,  rgba(150,0,0,0.82) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%,  rgba(80,0,0,0.25)  0%, rgba(6,0,0,0.92) 100%);
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    #bloody-overlay.active {
      animation: bloodyFlash 0.55s ease-in-out infinite;
    }
    /* --- 3D BLOOD DRIP --- */
    @keyframes dripFall {
      0%   { transform: scaleY(0.02) translateZ(0); opacity: 1; }
      65%  { opacity: 1; }
      100% { transform: scaleY(1)    translateZ(0); opacity: 0.08; }
    }
    @keyframes dripDrop {
      0%   { transform: scale(0.1) translateZ(0); opacity: 0; }
      20%  { transform: scale(1.1) translateZ(0); opacity: 1; }
      80%  { opacity: 0.9; }
      100% { transform: scale(1)   translateZ(0); opacity: 0; }
    }
    .blood-drip {
      position: fixed;
      top: 0;
      pointer-events: none;
      z-index: 61;
      transform-origin: top center;
      animation: dripFall linear forwards;
    }
    .blood-drop {
      position: fixed;
      pointer-events: none;
      z-index: 62;
      border-radius: 50% 50% 60% 60% / 45% 45% 55% 55%;
      animation: dripDrop ease-out forwards;
    }
    /* --- 3D BLOOD SPLAT --- */
    @keyframes splatAppear {
      0%   { transform: scale(0.05) translateZ(0); opacity: 0; }
      15%  { transform: scale(1.08) translateZ(0); opacity: 1; }
      75%  { opacity: 0.92; }
      100% { transform: scale(1.02) translateZ(0); opacity: 0; }
    }
    .blood-splat {
      position: fixed;
      pointer-events: none;
      z-index: 61;
      animation: splatAppear ease-out forwards;
    }
    @keyframes racePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes bombPulse {
      0%   { filter: drop-shadow(0 0 8px #ff2200) drop-shadow(0 0 20px #ff5500) brightness(1); }
      50%  { filter: drop-shadow(0 0 22px #ff0000) drop-shadow(0 0 50px #ffbb00) brightness(1.6); }
      100% { filter: drop-shadow(0 0 8px #ff2200) drop-shadow(0 0 20px #ff5500) brightness(1); }
    }
    .bomb-target {
      position: fixed;
      font-size: 3.6rem;
      z-index: 200;
      pointer-events: all;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      width: 82px;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0000;
      border-radius: 50%;
      border: 4px solid #ff4400;
      box-shadow: 0 0 14px 4px #ff2200, 0 0 40px 8px #ff5500;
      animation: bombPulse 0.7s ease-in-out infinite;
    }

    #timestamp {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #005500;
      letter-spacing: 0.1em;
      -webkit-user-select: none;
      user-select: none;
      z-index: 10;
    }

  </style>
</head>
<body>

  <div id="age-gate">
    <audio id="age-music" src="age-music.mp3" loop preload="auto"></audio>
    <button type="button" id="age-music-btn" title="Toggle music">&#9834;</button>
    <div id="warning-wrap"></div>
    <div class="skull-layer skull-base"></div>
    <div class="skull-layer skull-dof1"></div>
    <div class="skull-layer skull-dof2"></div>
    <div class="skull-layer skull-vignette"></div>
    <div class="skull-layer skull-eyeglow"></div>
    <h1>MATRIX01</h1>
    <p>YOU MUST BE 18 OR OLDER TO ENTER</p>
    <div class="instructions">
      &gt; Click the music icon for dark music<br>
      &gt; Click the emojis for spooky sounds<br>
      &gt; Read the story and be drawn into it<br>
      &gt; When you have entered tap grenades to get 50 points
    </div>
    <input type="number" id="age-input" placeholder="AGE" min="1" max="120" />
    <button type="button" id="age-btn">ENTER</button>
    <div id="age-error"></div>
  </div>

  <img id="bg-image" src="cool dool.png" alt="" />
  <img id="bg-image-dof" src="cool dool.png" alt="" />
  <canvas id="matrix"></canvas>
  <canvas id="matrix-dof"></canvas>
  <canvas id="matrix-dof2"></canvas>
  <canvas id="matrix-dof3"></canvas>
  <canvas id="matrix-dof4"></canvas>
  <div id="dof-vignette"></div>
  <canvas id="snake-canvas"></canvas>
  <canvas id="ghost-canvas"></canvas>
  <canvas id="trail-canvas"></canvas>
  <canvas id="cursor-canvas"></canvas>

  <div id="overlay">
    <div id="title">MATRIX01</div>
    <div id="subtitle">Wake up, Neo...</div>
  </div>

  <div id="bloody-overlay"></div>
  <div id="score">SCORE: 0</div>
  <div id="ai-score">GHOST: 0</div>
  <div id="timestamp"></div>
  <button type="button" id="music-toggle" title="Toggle music">&#9834;</button>

  <script>
    var ageGate  = document.getElementById('age-gate');
    var ageInput = document.getElementById('age-input');
    var ageBtn   = document.getElementById('age-btn');
    var ageError = document.getElementById('age-error');

    function checkAge() {
      var val = parseInt(ageInput.value, 10);
      if (isNaN(val) || val < 1) {
        ageError.textContent = 'PLEASE ENTER YOUR AGE.';
        return;
      }
      if (val < 18) {
        ageError.textContent = 'ACCESS DENIED. YOU MUST BE 18 OR OLDER.';
        ageInput.value = '';
        ageInput.focus();
        return;
      }
      var am = document.getElementById('age-music');
      if (am) { am.pause(); am.currentTime = 0; }
      if (window._stopThunder) window._stopThunder();
      ageGate.style.display = 'none';
      bgMusic.currentTime = 0;
      bgMusic.play().catch(function(){});
      musicOn = true;
    }

    ageBtn.addEventListener('click', checkAge);

    // ── 3D BLOOD WARNING TEXT (age gate only) ──
    (function() {
      var lines = [
        'W A R N I N G',
        'TO ALL WHO DARE ENTER',
        ' ',
        'I warn you stranger,',
        'you are about to enter',
        'your worst nightmare.',
        ' ',
        'Sounds that you will fear,',
        'sounds that will chase you',
        'forever — so go ahead,',
        'drink your beer.',
        'It might be your last',
        'if you chose to enter here.',
        ' ',
        'You enter at your own risk.',
        'So clench your fist,',
        "don't get so scared you",
        'fall and crack your disk.',
        ' ',
        'This is just a warning',
        'to all who dare enter.',
        'You have been warned.',
        'You enter at your own risk.'
      ];
      var html = lines.map(function(l) {
        return '<span style="display:block">' + l + '</span>';
      }).join('');
      var wrap = document.getElementById('warning-wrap');
      ['xfar', 'far', 'mid', 'near'].forEach(function(d) {
        var div = document.createElement('div');
        div.className = 'wt-layer wt-' + d;
        div.innerHTML = html;
        wrap.appendChild(div);
      });
      // ── BLOOD DRIP SPAWNER — 4-tier 3D depth of field ──
      var dripWrap = document.getElementById('warning-wrap');

      // 4 depth tiers: 0=xfar(ghost), 1=far, 2=mid, 3=near(foreground)
      var TIERS = {
        w:    [0.6,  1.2,  2.4,  4.5],   // streak width px
        hMin: [8,    14,   22,   35],     // min streak height px
        hMax: [25,   45,   75,   120],    // max streak height px
        dur:  [5.5,  3.8,  2.4,  1.5],   // base fall duration s
        durV: [2.0,  2.0,  1.5,  1.0],   // duration variance s
        col:  ['#280000','#4a0000','#880000','#c41200'],
        hi:   ['#3a0000','#6a0000','#aa1100','#e02000'], // highlight col
        opac: [0.18,  0.38,  0.65,  0.95],
        blur: ['blur(12px)','blur(6px)','blur(2px)','none'],
        bMul: [1.8,  2.2,  3.0,  4.2],   // blob size multiplier
        anim: ['dripFall','dripFall','dripFall','dripWobble']
      };

      function rnd(a, b) { return a + Math.random() * (b - a); }

      function spawnDrip() {
        // weight toward near tiers for drama: xfar=10%, far=20%, mid=30%, near=40%
        var r = Math.random();
        var tier = r < 0.10 ? 0 : r < 0.30 ? 1 : r < 0.60 ? 2 : 3;

        var T    = TIERS;
        var col  = T.col[tier];
        var hi   = T.hi[tier];
        var w    = T.w[tier];
        var h    = rnd(T.hMin[tier], T.hMax[tier]);
        var dur  = T.dur[tier] + rnd(0, T.durV[tier]);
        var opac = T.opac[tier] * rnd(0.85, 1.0);

        var drip = document.createElement('div');
        drip.className = 'blood-drip';
        drip.style.left    = rnd(1, 97) + '%';
        drip.style.top     = rnd(5, 60) + '%';
        drip.style.width   = w + 'px';
        drip.style.height  = h + 'px';
        drip.style.opacity = opac;
        drip.style.filter  = T.blur[tier];
        drip.style.animationName     = T.anim[tier];
        drip.style.animationDuration = dur + 's';
        drip.style.animationTimingFunction = 'ease-in';
        drip.style.animationFillMode = 'forwards';
        // streak: bright top (fresh), dark bottom (drying)
        drip.style.background =
          'linear-gradient(to bottom,' + hi + ' 0%, ' + col + ' 40%, #220000 80%, #080000 100%)';

        // ── Primary teardrop blob ─────────────────────────────────────
        var bW = w * T.bMul[tier] * rnd(0.85, 1.2);
        var bH = bW * rnd(0.8, 1.4);
        var blob = document.createElement('div');
        blob.className = 'blood-blob';
        blob.style.width  = bW + 'px';
        blob.style.height = bH + 'px';
        // wet specular: bright top-left, dark outer ring
        blob.style.background =
          'radial-gradient(ellipse at 35% 30%, ' + hi + ' 0%, ' + col + ' 45%, #1a0000 80%, transparent 100%)';
        blob.style.boxShadow = '0 ' + (bH * 0.3) + 'px ' + (bH * 0.5) + 'px rgba(0,0,0,0.7)';
        drip.appendChild(blob);

        // ── Satellite micro-drops (near/mid only) ────────────────────
        if (tier >= 2) {
          var numSat = tier === 3 ? Math.floor(rnd(1, 4)) : Math.floor(rnd(0, 2));
          for (var s = 0; s < numSat; s++) {
            var sat = document.createElement('div');
            sat.className = 'blood-blob-sat';
            var sR = bW * rnd(0.12, 0.32);
            sat.style.width    = sR * 2 + 'px';
            sat.style.height   = sR * 2 + 'px';
            sat.style.bottom   = (-bH * rnd(0.8, 2.2)) + 'px';
            sat.style.left     = (w / 2 + rnd(-bW * 1.2, bW * 1.2)) + 'px';
            sat.style.background =
              'radial-gradient(circle at 40% 35%, ' + hi + ' 0%, ' + col + ' 55%, transparent 100%)';
            drip.appendChild(sat);
          }
        }

        dripWrap.appendChild(drip);
        drip.addEventListener('animationend', function() { drip.remove(); });
      }

      // staggered burst on load
      for (var di = 0; di < 12; di++) {
        setTimeout(spawnDrip, di * 160);
      }
      // steady drip stream — faster for more coverage
      setInterval(spawnDrip, 180 + Math.floor(Math.random() * 200));

    })();
    ageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkAge();
    });
    ageInput.focus();

    var canvas = document.getElementById('matrix');
    var ctx = canvas.getContext('2d');
    var FONT_SIZE = 16;
    var cols, drops;

    function buildChars() {
      var s = '';
      for (var i = 0x30A2; i <= 0x30F3; i += 2) {
        s += String.fromCharCode(i);
      }
      s += '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';
      return s;
    }

    var CHARS = buildChars();
    var horrorActive = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / FONT_SIZE);
      drops = [];
      for (var i = 0; i < cols; i++) {
        drops[i] = Math.floor(Math.random() * -100);
      }
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = FONT_SIZE + 'px "Courier New", monospace';

      for (var i = 0; i < drops.length; i++) {
        var y = drops[i] * FONT_SIZE;
        var x = i * FONT_SIZE;
        var char = CHARS[Math.floor(Math.random() * CHARS.length)];

        ctx.fillStyle = '#eeffee';
        ctx.fillText(char, x, y);

        if (drops[i] > 1) {
          ctx.fillStyle = '#00ff41';
          ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], x, y - FONT_SIZE);
        }

        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    resize();
    window.addEventListener('resize', resize);
    setInterval(draw, 40);

    // --- MATRIX + IMAGE DEPTH OF FIELD ---
    // Two blurred canvas copies of the matrix at different blur levels,
    // each masked to different radii — creates a smooth DOF gradient
    // from sharp centre to heavily blurred extreme edges.
    // 4-layer DOF: each layer is a blurred copy of the matrix canvas,
    // masked to a progressively tighter ring so the blur increases
    // smoothly from centre (sharp) to extreme edges (maximum blur).
    // Layer 4 also has a hue-rotate filter for chromatic-aberration fringing.
    var dofCanvases = [
      document.getElementById('matrix-dof'),
      document.getElementById('matrix-dof2'),
      document.getElementById('matrix-dof3'),
      document.getElementById('matrix-dof4')
    ];
    var dofCtxs = dofCanvases.map(function(c) { return c.getContext('2d'); });
    var dofBlurs = [4, 11, 22, 36];  // px blur per layer
    var bgDofImg  = document.getElementById('bg-image-dof');
    var matrixDOF = false;

    function resizeDOF() {
      dofCanvases.forEach(function(c) {
        c.width  = window.innerWidth;
        c.height = window.innerHeight;
      });
    }
    resizeDOF();
    window.addEventListener('resize', resizeDOF);

    function animateDOF() {
      if (!matrixDOF) return;
      for (var li = 0; li < dofCtxs.length; li++) {
        var dc = dofCanvases[li], dx = dofCtxs[li];
        dx.clearRect(0, 0, dc.width, dc.height);
        dx.filter = 'blur(' + dofBlurs[li] + 'px)';
        dx.drawImage(canvas, 0, 0);
        dx.filter = 'none';
      }
      requestAnimationFrame(animateDOF);
    }
    // --- END MATRIX + IMAGE DOF ---

    var bgMusic = new Audio('Untitled 4.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.5;

    var musicOn = false;
    var musicBtn = document.getElementById('music-toggle');

    musicBtn.addEventListener('click', function() {
      if (musicOn) {
        bgMusic.pause();
        musicOn = false;
        musicBtn.classList.add('muted');
        musicBtn.innerHTML = '&#9835;';
      } else {
        bgMusic.play();
        musicOn = true;
        musicBtn.classList.remove('muted');
        musicBtn.innerHTML = '&#9834;';
      }
    });

    var spookySnd   = new Audio('Spooky,_creepy,_eeri-1758049336211.mp3');
    var laughSnd    = new Audio('freesound_community-succubus-laughter-71829 (1).mp3');
    var whisperSnd  = new Audio('a_women_whispering_H-%232-1758097415704.mp3');
    var shotgunSnd  = new Audio('kakaist-sound-shotgun-sfx-318127.mp3');
    var fourVoices  = new Audio('freesound_community-four_voices_whispering_2_wecho-6755.mp3');

    whisperSnd.addEventListener('ended', function() {
      shotgunSnd.currentTime = 0;
      shotgunSnd.play();
    });

    function maybePlaySpooky() {
      var r = Math.random();
      if (r < 0.05) {
        fourVoices.currentTime = 0;
        fourVoices.play();
      } else if (r < 0.15) {
        whisperSnd.currentTime = 0;
        whisperSnd.play();
      } else if (r < 0.25) {
        laughSnd.currentTime = 0;
        laughSnd.play();
      } else if (r < 0.55) {
        spookySnd.currentTime = 0;
        spookySnd.play();
      }
    }

    var EMOJIS = [
      '\u{1F620}', // grumpy
      '\u{1F60A}', // happy
      '\u{1F622}', // sad
      '\u{1F62D}', // crying
      '\u{1F632}', // surprised
      '\u{1F602}', // laughing
      '\u{1F624}', // upset
      '\u{1F621}'  // angry
    ];
    var score = 0;
    var scoreEl = document.getElementById('score');
    var activeEmojis = [];
    var battleMode = false;
    var raceOver = false;

    function checkRace() {
      if (raceOver) return;
      if (score >= 1000) { raceOver = true; showRaceResult(true); }
      else if (aiScore >= 1000) { raceOver = true; showRaceResult(false); }
    }

    function showRaceResult(playerWon) {
      clearBombs();
      var overlay = document.createElement('div');
      overlay.id = 'race-result';
      overlay.style.cssText = [
        'position:fixed','inset:0','z-index:900',
        'display:flex','flex-direction:column',
        'align-items:center','justify-content:center',
        'background:rgba(0,0,0,0.88)',
        'font-family:"Courier New",monospace',
        'cursor:default'
      ].join(';');

      var title = document.createElement('div');
      if (playerWon) {
        title.textContent = 'YOU WIN';
        title.style.cssText = 'font-size:clamp(3rem,10vw,7rem);font-weight:700;color:#00ff41;letter-spacing:0.3em;text-shadow:0 0 20px #00ff41,0 0 60px #00aa2a;animation:racePulse 1s ease-in-out infinite';
      } else {
        title.textContent = 'GHOST WINS';
        title.style.cssText = 'font-size:clamp(3rem,10vw,7rem);font-weight:700;color:#cc00ff;letter-spacing:0.2em;text-shadow:0 0 20px #cc00ff,0 0 60px #880088;animation:racePulse 0.6s ease-in-out infinite';
      }

      var sub = document.createElement('div');
      sub.textContent = playerWon
        ? 'You reached 1000 first. The ghost retreats.'
        : 'The ghost devoured 1000 souls before you. You lose.';
      sub.style.cssText = 'margin-top:1.5rem;font-size:clamp(0.9rem,2.5vw,1.4rem);color:#aaa;letter-spacing:0.1em;text-align:center;padding:0 2rem';

      var btn = document.createElement('button');
      btn.textContent = 'PLAY AGAIN';
      btn.style.cssText = [
        'margin-top:2.5rem','padding:0.8rem 2.5rem',
        'font-family:"Courier New",monospace','font-size:1.1rem',
        'background:transparent','cursor:pointer','letter-spacing:0.2em',
        playerWon
          ? 'color:#00ff41;border:2px solid #00ff41;box-shadow:0 0 12px #00ff41'
          : 'color:#cc00ff;border:2px solid #cc00ff;box-shadow:0 0 12px #cc00ff'
      ].join(';');
      btn.addEventListener('click', function() {
        overlay.remove();

        // reset scores
        score = 0; aiScore = 0;
        scoreEl.textContent = 'SCORE: 0';
        aiScoreEl.textContent = 'GHOST: 0';

        // clear any leftover emojis and bombs so nothing stale lingers
        for (var i = activeEmojis.length - 1; i >= 0; i--) {
          if (activeEmojis[i].parentNode) activeEmojis[i].remove();
        }
        activeEmojis = [];
        clearBombs();

        // kill any active snake so it doesn't carry over
        snake = null;
        sctx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);

        // reset ghost target and clear its canvas
        ghost.target = null;
        gctx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);

        // re-open the race and restart the ghost loop (it exited when raceOver was true)
        raceOver = false;
        tickGhost();
      });

      overlay.appendChild(title);
      overlay.appendChild(sub);
      overlay.appendChild(btn);
      document.body.appendChild(overlay);
    }

    function spawnEmoji() {
      var el = document.createElement('div');
      el.className = 'emoji-target';
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      var margin = 60;
      el.style.left = (margin + Math.random() * (window.innerWidth  - margin * 2)) + 'px';
      el.style.top  = (margin + Math.random() * (window.innerHeight - margin * 2)) + 'px';
      document.body.appendChild(el);
      activeEmojis.push(el);

      el.addEventListener('click', function(e) {
        if (raceOver) return;
        score++;
        scoreEl.textContent = 'SCORE: ' + score;
        maybePlaySpooky();
        showPointFlash(e.clientX, e.clientY, '+1');
        if (score % 100 === 0) startSnake();
        checkRace();
        maybeShowHorrorText();
        var r = el.getBoundingClientRect();
        var _cx = r.left + r.width/2, _cy = r.top + r.height/2;
        if (Math.random() < 0.5) spawnZombieBurst(_cx, _cy);
        else spawnZombie2Burst(_cx, _cy);
        if (Math.random() < 0.30) spawnGrenade();
        removeEmoji(el);
      });

      var lifetime = 3000 + Math.random() * 4000;
      setTimeout(function() { removeEmoji(el); }, lifetime);
    }

    var HORROR_TEXTS = [
      'The dark one will destroy your soul inside the horror train.\nHe will cut away at your brain\nYour heart will be his supper\nYou will be in pain you will be his dinner',
      'Before the dark one kills you he will feed you nightmares\nYou will dream horrors beyond your imagination feed you brutal fears\nTears of blood will fall down your face for years\nUntil you die you will be trapped in nightmare',
      'He lives inside the dole\nHe has possessed the dole its where it hides its soul\nIf you find it and kill it you might live to tell the tale\nBut be warned no one has survived after facing it you will fail'
    ];

    var horrorIndex = 0;

    function maybeShowHorrorText() {
      if (Math.random() >= 0.05) return;
      var text = HORROR_TEXTS[horrorIndex % HORROR_TEXTS.length];
      horrorIndex++;
      var el = document.createElement('div');
      el.className = 'horror-text';
      el.style.opacity = '1';
      el.textContent = text;
      el.style.whiteSpace = 'pre-line';
      document.body.appendChild(el);
      document.body.classList.add('horror-active');
      horrorActive = true;
      var st = null;
      var hold = 9000;
      var fadeLen = 1000;
      function fade(ts) {
        if (!st) st = ts;
        var elapsed = ts - st;
        if (elapsed < hold) {
          el.style.opacity = '1';
          requestAnimationFrame(fade);
        } else {
          var p = Math.min((elapsed - hold) / fadeLen, 1);
          el.style.opacity = String(1 - p);
          if (p < 1) { requestAnimationFrame(fade); } else {
            el.remove();
            document.body.classList.remove('horror-active');

    var snakeCanvas = document.getElementById('snake-canvas');

    function pickSnakeTarget() {
      var alive = activeEmojis.filter(function(e) { return !!e.parentNode; });
      if (alive.length === 0) return null;
      return alive[Math.floor(Math.random() * alive.length)];
    }

    function startSnake() {
      if (snake) return;
      snake = {
        x:        Math.random() * window.innerWidth,
        y:        Math.random() * window.innerHeight,
        vx:       0,
        vy:       0,
        segments: [],
        wobble:   0,
        target:   null,
        timeLeft: 20000,
        lastTs:   null
      };
      for (var i = 0; i < 35; i++) {
        snake.segments.push({ x: snake.x, y: snake.y });
      }
      snake.target = pickSnakeTarget();
      requestAnimationFrame(tickSnake);
    }

    function tickSnake(ts) {
      if (!snake) return;
      sctx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);

      if (!snake.lastTs) snake.lastTs = ts;
      var dt = Math.min(ts - snake.lastTs, 50);
      snake.lastTs = ts;
      snake.timeLeft -= dt;
      if (snake.timeLeft <= 0) { snake = null; return; }

      // refresh target if gone
      if (!snake.target || !snake.target.parentNode) {
        snake.target = pickSnakeTarget();
      }

      var spd = 14;
      snake.wobble += dt * 0.008;

      if (snake.target && snake.target.parentNode) {
        var tx = parseFloat(snake.target.style.left) + 14;
        var ty = parseFloat(snake.target.style.top)  + 14;
        var ta = Math.atan2(ty - snake.y, tx - snake.x);
        // zig-zag wobble layered on top of homing angle
        var finalAngle = ta + Math.sin(snake.wobble) * 0.9;
        snake.vx = Math.cos(finalAngle) * spd;
        snake.vy = Math.sin(finalAngle) * spd;
      } else {
        snake.vx = Math.cos(snake.wobble) * spd;
        snake.vy = Math.sin(snake.wobble) * spd;
      }

      snake.x = Math.max(0, Math.min(snakeCanvas.width,  snake.x + snake.vx));
      snake.y = Math.max(0, Math.min(snakeCanvas.height, snake.y + snake.vy));

      snake.segments.unshift({ x: snake.x, y: snake.y });
      if (snake.segments.length > 35) snake.segments.pop();

      // collision — read style.left/top directly, check 6 segments for tunneling
      var checkSegs = Math.min(6, snake.segments.length);
      for (var ci = activeEmojis.length - 1; ci >= 0; ci--) {
        var em  = activeEmojis[ci];
        if (!em.parentNode) continue;
        var ecx = parseFloat(em.style.left)  + 14;
        var ecy = parseFloat(em.style.top)   + 14;
        var hit = false;
        for (var cs = 0; cs < checkSegs; cs++) {
          var seg = snake.segments[cs];
          var ddx = seg.x - ecx;
          var ddy = seg.y - ecy;
          if (ddx*ddx + ddy*ddy < 60*60) { hit = true; break; }
        }
        if (hit) {
          score += 5;
          scoreEl.textContent = 'SCORE: ' + score;
          if (score % 100 === 0) startSnake();
          checkRace();
          maybePlaySpooky();
          showPointFlash(ecx, ecy, '+5');
          removeEmoji(em);
        }
      }

      // draw glowing body
      sctx.shadowBlur  = 18;
      sctx.shadowColor = '#ff2200';
      for (var j = snake.segments.length - 1; j >= 0; j--) {
        var seg = snake.segments[j];
        var t   = 1 - j / snake.segments.length;
        var rad = 9 * t + 1;
        sctx.beginPath();
        sctx.arc(seg.x, seg.y, rad, 0, Math.PI * 2);
        sctx.fillStyle = 'rgba(' + Math.floor(180 + 75*t) + ',' + Math.floor(20*t) + ',0,' + (t * 0.95) + ')';
        sctx.fill();
      }

      // demon eyes on head
      var head  = snake.segments[0];
      var ha    = Math.atan2(snake.vy, snake.vx);
      var px    = Math.sin(ha) * 4;
      var py    = -Math.cos(ha) * 4;
      var fx    = Math.cos(ha) * 7;
      var fy    = Math.sin(ha) * 7;
      sctx.shadowBlur  = 8;
      sctx.shadowColor = '#ff0000';
      sctx.fillStyle   = '#ffffff';
      [[px,py],[-px,-py]].forEach(function(o) {
        sctx.beginPath();
        sctx.arc(head.x + fx + o[0], head.y + fy + o[1], 2.5, 0, Math.PI * 2);
        sctx.fill();
      });
      sctx.fillStyle = '#ff0000';
      [[px,py],[-px,-py]].forEach(function(o) {
        sctx.beginPath();
        sctx.arc(head.x + fx + o[0], head.y + fy + o[1], 1.2, 0, Math.PI * 2);
        sctx.fill();
      });

      sctx.shadowBlur = 0;
      requestAnimationFrame(tickSnake);
    }

    function drawGhost(x, y, a) {

          if (!v) continue;
          var px = x - G_W / 2 + col * G_PX;

          if (evil) {
            if (v === 1) gctx.fillStyle = 'rgba(110,0,160,'   + a + ')';

    function tickGhost() {
      if (raceOver) return;
      gctx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);

      ghost.floatT  += 0.045;

      ghost.flickerT += 0.3;

      GHOST_MAP = (Math.sin(ghostFlipT) > 0) ? GHOST_EVIL : GHOST_NICE;

      var base    = 0.45 + Math.pow(Math.max(0, Math.sin(ghost.phaseT)), 0.4) * 0.5;
      var flicker = 1 - (Math.max(0, Math.sin(ghost.flickerT)) * 0.12 * (1 - base));
      ghost.alpha = Math.max(0.35, base * flicker);

      if (!ghost.target || !ghost.target.parentNode) {
        ghost.target = pickGhostTarget();
      }

      if (ghost.target && ghost.target.parentNode) {
        var tx   = parseFloat(ghost.target.style.left) + 14;
        var ty   = parseFloat(ghost.target.style.top)  + 14;
        var dx   = tx - ghost.x;
        var dy   = ty - ghost.y;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 4) {
          var spd = 8.5;
          ghost.x += (dx / dist) * spd + Math.sin(ghost.floatT * 1.1) * 0.8;
          ghost.y += (dy / dist) * spd + Math.cos(ghost.floatT * 0.7) * 0.5;
          var gw = 40, gh = 40;
          ghost.x = Math.max(0, Math.min(window.innerWidth  - gw, ghost.x));

    function animateBlood() {
      bloodPhase += 0.07;

      var flash = 0.65 + Math.sin(bloodPhase) * 0.35;

      tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      tctx.font = FONT_SIZE + 'px "Courier New", monospace';

      for (var i = bloodDrops.length - 1; i >= 0; i--) {
        var d = bloodDrops[i];

        // draw + decay trail chars
        for (var t = d.trail.length - 1; t >= 0; t--) {
          d.trail[t].life -= 0.035;
          if (d.trail[t].life <= 0) { d.trail.splice(t, 1); continue; }
          tctx.globalAlpha = d.trail[t].life * flash;
          tctx.fillStyle = '#aa0000';
          tctx.fillText(d.trail[t].char, d.x, d.trail[t].y);
        }

        // draw lead char
        var y = d.drop * FONT_SIZE;
        if (y <= trailCanvas.height + FONT_SIZE) {
          var char = CHARS[Math.floor(Math.random() * CHARS.length)];
          tctx.globalAlpha = flash;
          tctx.fillStyle = '#ff3333';
          tctx.fillText(char, d.x, y);
          d.trail.push({ char: char, y: y, life: 0.9 });
          d.drop++;
        }

        if (d.trail.length === 0 && y > trailCanvas.height + FONT_SIZE) {

    function drawPumpkinCursor(x, y) {
      pumpkinBob += 0.08;

      var ph = PUMPKIN.length    * P_PX;

      cctx.shadowBlur  = 20;
      cctx.shadowColor = 'rgba(255,100,0,0.9)';

      for (var row = 0; row < PUMPKIN.length; row++) {
        for (var col = 0; col < PUMPKIN[row].length; col++) {
          var v = PUMPKIN[row][col];
          if (!v) continue;
          var px = x - pw / 2 + col * P_PX;
          var py = y - ph / 2 + row * P_PX + by;
          if (v === 1) cctx.fillStyle = '#1a6600';          // stem
          if (v === 2) cctx.fillStyle = '#cc5500';          // pumpkin body
          if (v === 3) cctx.fillStyle = '#0a0000';          // black carving
          if (v === 4) cctx.fillStyle = 'rgba(255,80,0,0.9)'; // eye glow
          if (v === 5) cctx.fillStyle = '#ffddaa';          // tooth
          cctx.fillRect(px, py, P_PX, P_PX);
        }
      }
      cctx.shadowBlur = 0;

      // collect midpoint-displaced bolt segments into flat array [x1,y1,x2,y2,...]
      function boltSegs(x1,y1,x2,y2,r,d,out) {
        if (d === 0) { out.push(x1,y1,x2,y2); return; }
        var len = Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)) || 1;
        var nx  = -(y2-y1)/len, ny = (x2-x1)/len;

        strokeSegs(ctx, segs, lw*4.5, 'rgba(170,100,255,0.14)');
        strokeSegs(ctx, segs, lw*2,   'rgba(210,170,255,0.38)');
        strokeSegs(ctx, segs, lw,     'rgba(248,240,255,0.97)');

        var g = ctx.createRadialGradient(sx,0,0,sx,0,w*0.55);

        grenadeUrl = cv.toDataURL('image/png');
      };
      tmp.src = 'grenade.png';
    })();

    var explosionUrl = null;
    (function() {
      var tmp = new Image();
      tmp.onload = function() {
        var cv = document.createElement('canvas');
        cv.width = tmp.naturalWidth; cv.height = tmp.naturalHeight;
        var ctx = cv.getContext('2d');
        ctx.drawImage(tmp, 0, 0);
        var id = ctx.getImageData(0, 0, cv.width, cv.height), px = id.data;
        for (var i = 0; i < px.length; i += 4) {
          var r = px[i], g = px[i+1], b = px[i+2];
          if (r > 210 && g > 210 && b > 210 &&
              Math.abs(r-g) < 20 && Math.abs(r-b) < 20 && Math.abs(g-b) < 20)
            px[i+3] = 0;
        }
        ctx.putImageData(id, 0, 0);
        explosionUrl = cv.toDataURL('image/png');
      };
      tmp.src = 'explosion.png';
    })();

    function spawnGrenade() {
      if (!grenadeUrl) return;
      var margin = 90;
      var gx = margin + Math.random() * (window.innerWidth  - margin * 2);
      var gy = margin + Math.random() * (window.innerHeight - margin * 2);
      var wrap = document.createElement('div');
      wrap.className = 'grenade-target';
      wrap.style.left = gx + 'px';
      wrap.style.top  = gy + 'px';
      // 3 DOF layers: blurry halo → sharp centre
      [{sz:110,blur:10,op:0.25},{sz:88,blur:3,op:0.55},{sz:70,blur:0,op:1.0}].forEach(function(L) {
        var img = document.createElement('img');
        img.src = grenadeUrl;
        img.style.cssText = 'position:absolute;width:'+L.sz+'px;height:auto;left:50%;top:50%;transform:translate(-50%,-50%);opacity:'+L.op+';pointer-events:none;';
        if (L.blur) img.style.filter = 'blur('+L.blur+'px)';
        wrap.appendChild(img);
      });
      // pulse glow on sharp layer (last child)
      wrap.lastChild.style.animation = 'grenadePulse 1.1s ease-in-out infinite';
      document.body.appendChild(wrap);
      var done = false;
      wrap.addEventListener('click', function(e) {
        if (done) return; done = true;
        var snd = new Audio('grenade-sound.mp3'); snd.volume = 1.0; snd.play().catch(function(){});
        score += 50;
        scoreEl.textContent = 'SCORE: ' + score;
        showPointFlash(e.clientX, e.clientY, '+50!');
        // DOF explosion burst
        [{sz:520,blur:32,op:0.20,dur:0.60},{sz:400,blur:16,op:0.45,dur:0.72},
         {sz:290,blur:5, op:0.80,dur:0.84},{sz:230,blur:0, op:1.00,dur:0.95}].forEach(function(L) {
          var img = document.createElement('img');
          img.className = 'grenade-burst';
          img.src = explosionUrl || grenadeUrl;
          img.style.setProperty('--go', L.op);
          img.style.left = e.clientX+'px'; img.style.top = e.clientY+'px';
          img.style.width = L.sz+'px'; img.style.height = 'auto';
          if (L.blur) img.style.filter = 'blur('+L.blur+'px)';
          img.style.animationDuration = L.dur+'s';
          document.body.appendChild(img);
          img.addEventListener('animationend', function() { img.remove(); });
        });
        wrap.remove();
      });
      setTimeout(function() { if (!done) { done = true; wrap.remove(); } }, 5000);
    }

    function spawnZombieBurst(cx, cy) {
      if (!zombieUrl) return;
      var layers = [
        { sz: 310, blur: 20,  op: 0.20, dur: 0.62 },
        { sz: 250, blur: 9,   op: 0.45, dur: 0.70 },
        { sz: 195, blur: 2.5, op: 0.75, dur: 0.78 },
        { sz: 160, blur: 0,   op: 1.00, dur: 0.86 }
      ];
      layers.forEach(function(L) {
        var img = document.createElement('img');
        img.className = 'zombie-burst';
        img.src = zombieUrl;
        img.style.setProperty('--zo', L.op);
        img.style.left   = cx + 'px';
        img.style.top    = cy + 'px';
        img.style.width  = L.sz + 'px';
        img.style.height = 'auto';
        if (L.blur > 0) img.style.filter = 'blur(' + L.blur + 'px)';
        img.style.animationDuration = L.dur + 's';
        document.body.appendChild(img);
        img.addEventListener('animationend', function() { img.remove(); });
      });
    }
    // -----------------------------------------------------------------------
  </script>
</body>
</html>
